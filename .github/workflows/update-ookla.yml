name: Update Ookla Speedtest CLI

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

permissions:
  contents: write
  actions: write

concurrency:
  group: update-ookla-main
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out main
        uses: actions/checkout@v7
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.x"

      - name: Update package recipe
        run: python3 scripts/update_ookla.py

      - name: Run tests
        run: python3 -m unittest discover -s tests -v

      - name: Check for recipe changes
        id: recipe
        run: |
          if git diff --quiet -- Makefile; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push update
        if: steps.recipe.outputs.changed == 'true'
        shell: bash
        run: |
          mapfile -t versions < <(sed -nE 's/^PKG_VERSION:=([0-9]+(\.[0-9]+)*)$/\1/p' Makefile)
          if (( ${#versions[@]} != 1 )); then
            echo "Expected exactly one valid PKG_VERSION in Makefile" >&2
            exit 1
          fi
          version="${versions[0]}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit --only -m "chore: update Ookla Speedtest CLI to ${version}" -- Makefile
          git push origin HEAD:main

      - name: Dispatch Speedtest release
        if: steps.recipe.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run release.yml --ref main
